    <style>
        :root {
            --bg: #050507;

            --ui-panel: rgba(9, 10, 12, 0.8);

            --accent: #0071e3;

        body, html {

            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

        }

        #webgl-container {

        }

        /* --- КИНЕМАТОГРАФИЧНЫЙ HUD ИНТЕРФЕЙС --- */
        .hud-frame {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none; box-sizing: border-box;
            border: 14px solid rgba(255, 255, 255, 0.02);
            transition: all 0.5s ease;
        }

        header {
            position: absolute; top: 30px; left: 40px; right: 40px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 20; pointer-events: auto;
        }

        .logo-block { display: flex; flex-direction: column; }
        .logo-main { font-size: 20px; font-weight: 900; letter-spacing: 4px; text-transform: uppercase; background: linear-gradient(45deg, #fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo-sub { font-size: 9px; opacity: 0.4; letter-spacing: 2px; margin-top: 4px; text-transform: uppercase; }

        .lang-btn {
            background: rgba(255,255,255,0.04); border: 1px solid var(--border);
            color: white; padding: 8px 18px; border-radius: 20px;
            cursor: pointer; font-weight: 600; font-size: 11px; backdrop-filter: blur(12px); transition: all 0.3s;
        }
        .lang-btn:hover { background: white; color: black; box-shadow: 0 0 15px rgba(255,255,255,0.25); }

        .specs-panel {
            position: absolute; left: 40px; top: 110px; bottom: 130px;
            width: 350px; background: var(--ui-panel); border: 1px solid var(--border);
            backdrop-filter: blur(30px); border-radius: 24px; padding: 25px;
            box-sizing: border-box; z-index: 20; pointer-events: auto;
            display: flex; flex-direction: column; justify-content: flex-start;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            overflow-y: auto; gap: 20px;
        }

        .specs-panel::-webkit-scrollbar { width: 3px; }
        .specs-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

        .product-title { font-size: 26px; font-weight: 800; margin: 0; letter-spacing: -0.5px; }
        .product-desc { font-size: 13px; opacity: 0.5; line-height: 1.5; margin: 0; }
        
        .tech-list { display: flex; flex-direction: column; gap: 14px; border-top: 1px solid var(--border); padding-top: 15px; }
        .tech-item { display: flex; flex-direction: column; gap: 3px; }
        .tech-label { opacity: 0.35; text-transform: uppercase; font-size: 9px; letter-spacing: 1px; font-weight: 600; }
        .tech-val { font-size: 12.5px; font-weight: 500; opacity: 0.9; line-height: 1.4; }

        .tabs-wrapper {
            position: absolute; bottom: 30px; left: 40px; right: 40px;
            display: flex; justify-content: center; z-index: 20; pointer-events: auto;
        }

        .tabs-container {
            display: flex; gap: 8px; background: var(--ui-panel);
            padding: 6px; border-radius: 40px; border: 1px solid var(--border);
            backdrop-filter: blur(20px); max-width: 100%; overflow-x: auto;
        }
        .tabs-container::-webkit-scrollbar { display: none; }

        .tab-btn {
            background: transparent; border: none; padding: 10px 16px;
            border-radius: 30px; color: rgba(255,255,255,0.45); cursor: pointer;
            font-weight: 600; font-size: 12px; display: flex; align-items: center;
            gap: 8px; white-space: nowrap; transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .tab-btn svg { width: 14px; height: 14px; fill: currentColor; }
        .tab-btn:hover { color: white; background: rgba(255,255,255,0.02); }
        .tab-btn.active {
            background: white; color: black; font-weight: 700;
            box-shadow: 0 4px 12px rgba(255,255,255,0.2);
        }

        .color-palette {
            position: absolute; right: 40px; top: 110px;
            display: flex; flex-direction: column; gap: 12px;
            background: var(--ui-panel); padding: 12px; border-radius: 30px;
            border: 1px solid var(--border); backdrop-filter: blur(20px); z-index: 20; pointer-events: auto;
        }

        .palette-dot {
            width: 20px; height: 20px; border-radius: 50%; cursor: pointer;
            border: 2px solid transparent; transition: all 0.25s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); position: relative;
        }
        .palette-dot:hover { transform: scale(1.15); }
        .palette-dot.active { border-color: white; transform: scale(1.05); }
        
        .color-tooltip {
            position: absolute; right: 35px; top: 50%; transform: translateY(-50%) translateX(-10px);

        }
        .palette-dot:hover .color-tooltip { opacity: 1; transform: translateY(-50%) translateX(0); }

            position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
            font-size: 10px; letter-spacing: 3px; text-transform: uppercase; opacity: 0.3;
            z-index: 10; pointer-events: none;

        // --- СТУДИЙНЫЙ СВЕТ ВЫСОКОГО РАЗРЕШЕНИЯ ---
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x050509, 0.5);
        scene.add(hemiLight);

        const mainLight = new THREE.DirectionalLight(0xffffff, 2.5);
        mainLight.position.set(5, 9, 5);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 2048;
        mainLight.shadow.mapSize.height = 2048;
        mainLight.shadow.bias = -0.00005;
        scene.add(mainLight);

        const rimLightBlue = new THREE.PointLight(0x0071e3, 3.5, 10);
        rimLightBlue.position.set(-4, 2, -3);
        scene.add(rimLightBlue);

        const rimLightWhite = new THREE.DirectionalLight(0xffffff, 1.2);
        rimLightWhite.position.set(-5, 4, -1);
        scene.add(rimLightWhite);

        // --- ГЛЯНЦЕВАЯ ПОДСТАВКА ПОЛА ---
        const floorGeo = new THREE.PlaneGeometry(50, 50);
        const floorMat = new THREE.MeshStandardMaterial({ 
            color: 0x07080a, roughness: 0.22, metalness: 0.7 
        });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -1.0;
        floor.receiveShadow = true;
        scene.add(floor);

        // --- ПРОЦЕДУРНАЯ ГЕНЕРАЦИЯ 3D КОРПУСА ---
        let laptopGroup = new THREE.Group();
        laptopGroup.position.y = -0.2;
        scene.add(laptopGroup);

        let screenGroup;

        function buildHighlyDetailedLaptop(colorHex) {
            // Полная очистка памяти при переключении
            while(laptopGroup.children.length > 0){ 
                laptopGroup.remove(laptopGroup.children[0]); 
            }

            const primaryColor = new THREE.Color(colorHex);
            
            const alloyMaterial = new THREE.MeshStandardMaterial({ color: primaryColor, roughness: 0.2, metalness: 0.85 });
            const innerPlastics = new THREE.MeshStandardMaterial({ color: 0x131417, roughness: 0.45, metalness: 0.15 });
            const screenGlass = new THREE.MeshStandardMaterial({ color: 0x010101, roughness: 0.04, metalness: 0.95, emissive: 0x0b0b0c });
            const trackpadMat = new THREE.MeshStandardMaterial({ color: primaryColor, roughness: 0.38, metalness: 0.4 });
            const logoMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });

            // 1. Топкейс (Нижняя часть)
            const baseGroup = new THREE.Group();
            const mainBase = new THREE.Mesh(new THREE.BoxGeometry(2.6, 0.08, 1.8), alloyMaterial);
            mainBase.castShadow = true; mainBase.receiveShadow = true;
            baseGroup.add(mainBase);

            // Решетка клавиатуры
            const kbPlate = new THREE.Mesh(new THREE.BoxGeometry(2.3, 0.01, 1.0), innerPlastics);
            kbPlate.position.set(0, 0.041, -0.1);
            baseGroup.add(kbPlate);

            const keysGeo = new THREE.BoxGeometry(2.26, 0.015, 0.96);
            const keys = new THREE.Mesh(keysGeo, new THREE.MeshStandardMaterial({color: 0x1a1b1f, roughness: 0.6}));
            keys.position.set(0, 0.05, -0.1);
            baseGroup.add(keys);

            // Тачпад
            const pad = new THREE.Mesh(new THREE.PlaneGeometry(0.7, 0.45), trackpadMat);
            pad.rotation.x = -Math.PI / 2;
            pad.position.set(0, 0.042, 0.52);
            baseGroup.add(pad);

            // Ножки
            const footGeo = new THREE.CylinderGeometry(0.04, 0.04, 0.02, 16);
            const foot1 = new THREE.Mesh(footGeo, innerPlastics); foot1.position.set(1.1, -0.05, 0.6);
            const foot2 = new THREE.Mesh(footGeo, innerPlastics); foot2.position.set(-1.1, -0.05, 0.6);
            const foot3 = new THREE.Mesh(footGeo, innerPlastics); foot3.position.set(1.1, -0.05, -0.6);
            const foot4 = new THREE.Mesh(footGeo, innerPlastics); foot4.position.set(-1.1, -0.05, -0.6);
            baseGroup.add(foot1, foot2, foot3, foot4);

            // Порты периферии
            const portGeo = new THREE.BoxGeometry(0.015, 0.02, 0.08);
            const port1 = new THREE.Mesh(portGeo, innerPlastics); port1.position.set(1.301, 0.01, 0.2);
            const port2 = new THREE.Mesh(portGeo, innerPlastics); port2.position.set(1.301, 0.01, 0.4);
            const port3 = new THREE.Mesh(portGeo, innerPlastics); port3.position.set(-1.301, 0.01, 0.3);
            baseGroup.add(port1, port2, port3);

            laptopGroup.add(baseGroup);

            // 2. Дисплейный блок (Верхняя крышка)
            screenGroup = new THREE.Group();
            screenGroup.position.set(0, 0.04, -0.88); // Точный инжиниринговый центр петли

            const lid = new THREE.Mesh(new THREE.BoxGeometry(2.6, 1.7, 0.04), alloyMaterial);
            lid.position.y = 0.85; lid.castShadow = true;
            screenGroup.add(lid);

            const display = new THREE.Mesh(new THREE.PlaneGeometry(2.5, 1.6), screenGlass);
            display.position.set(0, 0.85, 0.021);
            screenGroup.add(display);

            const frameBezel = new THREE.Mesh(new THREE.BoxGeometry(2.56, 1.66, 0.005), innerPlastics);
            frameBezel.position.set(0, 0.85, 0.02);
            screenGroup.add(frameBezel);

            const logo = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.18, 0.005), logoMaterial);
            logo.position.set(0, 0.85, -0.021);
            screenGroup.add(logo);

            screenGroup.rotation.x = Math.PI / 2.3; // Угол раскрытия
            laptopGroup.add(screenGroup);
        }

        // --- ДИНАМИЧЕСКИЙ ОБНОВИТЕЛЬ ИНТЕРФЕЙСА ---
        function refreshUI() {
            const currentData = database[currentLang];
            const currentLaptop = currentData.laptops[activeModelId];

            document.getElementById('p-title').innerText = currentLaptop.name;
            document.getElementById('p-desc').innerText = currentLaptop.desc;
            document.getElementById('v-cpu').innerText = currentLaptop.cpu;
            document.getElementById('v-ram').innerText = currentLaptop.ram;
            document.getElementById('v-gpu').innerText = currentLaptop.gpu;
            document.getElementById('v-screen').innerText = currentLaptop.screen;
            document.getElementById('v-cool').innerText = currentLaptop.cool;
            document.getElementById('v-ports').innerText = currentLaptop.ports;
            document.getElementById('v-bat').innerText = currentLaptop.bat;

            document.getElementById('lbl-cpu').innerText = currentData.labels.cpu;
            document.getElementById('lbl-ram').innerText = currentData.labels.ram;
            document.getElementById('lbl-gpu').innerText = currentData.labels.gpu;
            document.getElementById('lbl-screen').innerText = currentData.labels.screen;
            document.getElementById('lbl-cool').innerText = currentData.labels.cool;
            document.getElementById('lbl-ports').innerText = currentData.labels.ports;
            document.getElementById('lbl-bat').innerText = currentData.labels.bat;

            document.getElementById('l-sub').innerText = currentData.sub;
            document.getElementById('l-hold').innerText = currentData.hold;

            // Цветовая палитра под конкретную модель
            const paletteBox = document.getElementById('palette-box');
            paletteBox.innerHTML = '';
            currentLaptop.colors.forEach(color => {
                const dot = document.createElement('div');
                dot.className = `palette-dot ${color.h === activeColorHex ? 'active' : ''}`;
                dot.style.backgroundColor = color.h;
                dot.innerHTML = `<div class="color-tooltip">${color.n}</div>`;
                dot.onclick = () => {
                    activeColorHex = color.h;
                    buildHighlyDetailedLaptop(color.h);
                    refreshUI();
                };
                paletteBox.appendChild(dot);
            });

            // Нижние табы переключения ноутбуков
            const tabsBox = document.getElementById('tabs-box');
            tabsBox.innerHTML = '';
            currentData.laptops.forEach(lap => {
                const button = document.createElement('button');
                button.className = `tab-btn ${lap.id === activeModelId ? 'active' : ''}`;
                button.onclick = () => {
                    activeModelId = lap.id;
                    activeColorHex = database[currentLang].laptops[lap.id].colors[0].h;
                    buildHighlyDetailedLaptop(activeColorHex);

                    // Кинематографичная анимация смены устройства
                    gsap.from(laptopGroup.position, { y: 0.6, duration: 0.6, ease: "power2.out" });
                    gsap.from(laptopGroup.rotation, { y: Math.PI / 3, duration: 0.8, ease: "power2.out" });
                    
                    refreshUI();
                };
                button.innerHTML = `
                    <svg viewBox="0 0 24 24"><path d="M20,18H4V6H20M20,4H4C2.89,4 2,4.89 2,6V18A2,2 0 0,0 4,20H20A2,2 0 0,0 22,18V6C22,4.89 21.1,4 20,4M24,22H0V24H24V22Z"/></svg>
                    ${lap.name}
                `;
                tabsBox.appendChild(button);
            });
        }

        function changeLanguage() {
            currentLang = currentLang === "ru" ? "en" : "ru";
            document.getElementById('l-lang').innerText = currentLang === "ru" ? "EN" : "RU";
            refreshUI();
        }

        // --- КИНО-РЕЖИМ НАВЕДЕНИЯ КАМЕРЫ ПРИ КЛИКЕ ---
        let holdActive = false;

        function triggerHoldMode() {
            holdActive = true;
            controls.autoRotate = false; // Отключаем вращение при удержании фокуса
            gsap.to(camera.position, { x: 1.6, y: 0.7, z: 3.0, duration: 1.2, ease: "power3.out" });
            gsap.to('.hud-frame', { backgroundColor: "rgba(0,0,0,0.3)", borderColor: "rgba(255,255,255,0.15)", duration: 1.2 });
            if(screenGroup) gsap.to(screenGroup.rotation, { x: Math.PI / 2.7, duration: 0.8 });
        }

        function releaseHoldMode() {
            if (!holdActive) return;
            holdActive = false;
            controls.autoRotate = true; // Возвращаем плавный пролёт по кругу
            gsap.to(camera.position, { x: 0, y: 2.8, z: 6.5, duration: 0.9, ease: "power2.out" });
            gsap.to('.hud-frame', { backgroundColor: "rgba(0,0,0,0)", borderColor: "rgba(255,255,255,0.02)", duration: 0.9 });
            if(screenGroup) gsap.to(screenGroup.rotation, { x: Math.PI / 2.3, duration: 0.7 });
        }

        container.addEventListener('mousedown', triggerHoldMode);
        window.addEventListener('mouseup', releaseHoldMode);
        container.addEventListener('touchstart', triggerHoldMode);
        window.addEventListener('touchend', releaseHoldMode);

        // --- ЦИКЛ КЛАССИЧЕСКОГО РЕНДЕРИНГА (LOOP) ---
        function renderLoop() {
            requestAnimationFrame(renderLoop);
            controls.update(); // Демпфирование и нативное автовращение работают в связке
            renderer.render(scene, camera);
        }

        // Адаптивность дисплея при ресайзе окна браузера
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Первичный запуск конфигуратора
        buildHighlyDetailedLaptop(activeColorHex);
        refreshUI();
        renderLoop();
    </script>
</body>
</html>

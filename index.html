<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Laptop Configurator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --bg: #0a0a0c;
            --ui-color: rgba(255, 255, 255, 0.85);
            --accent: #0071e3;
            --hud-border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--ui-color);
            user-select: none;
        }

        /* 3D холст на весь экран */
        #webgl-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* --- КИНЕМАТОГРАФИЧНЫЙ ИНТЕРФЕЙС (HUD как у Lusion) --- */
        .hud-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            box-sizing: border-box;
            border: 20px solid var(--hud-border);
            transition: border-color 0.5s ease;
        }

        header {
            position: absolute;
            top: 40px;
            left: 40px;
            right: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
            pointer-events: auto;
        }

        .logo-area {
            display: flex;
            flex-direction: column;
        }
        .logo { font-size: 20px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }
        .sub-logo { font-size: 10px; opacity: 0.5; letter-spacing: 1px; margin-top: 2px;}

        /* Сетка выбора моделей (Иконки ноутбуков) */
        .model-selector {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 20;
            pointer-events: auto;
        }

        .model-btn {
            background: rgba(20, 20, 25, 0.6);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--ui-color);
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .model-btn svg { width: 18px; height: 18px; fill: currentColor; transition: transform 0.3s; }
        .model-btn:hover svg { transform: scale(1.15); }
        .model-btn.active {
            background: white;
            color: black;
            border-color: white;
            box-shadow: 0 10px 30px rgba(255,255,255,0.2);
        }

        /* Выбор цветов справа */
        .color-picker {
            position: absolute;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 20;
            pointer-events: auto;
        }

        .color-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s, border-color 0.2s;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .color-dot:hover { transform: scale(1.2); }
        .color-dot.active { border-color: white; transform: scale(1.1); }

        /* Информационная панель слева */
        .info-panel {
            position: absolute;
            left: 40px;
            top: 35%;
            max-width: 320px;
            z-index: 20;
            pointer-events: auto;
        }

        .info-title { font-size: 32px; font-weight: 700; margin: 0 0 10px 0; line-height: 1.1; }
        .info-desc { font-size: 14px; opacity: 0.6; line-height: 1.6; margin-bottom: 20px; }
        .info-spec { font-size: 12px; font-family: monospace; opacity: 0.8; margin: 5px 0; color: #888; }
        .info-spec span { color: white; }

        /* Кнопка удержания (Интерактив как в Lusion) */
        .hold-instruction {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.4;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 0.7; }
            100% { opacity: 0.3; }
        }

        /* Переключатель языков */
        .lang-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 6px 14px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.2s;
        }
        .lang-btn:hover { background: white; color: black; }
    </style>
</head>
<body>

    <div id="webgl-container"></div>
    <div class="hud-layer"></div>

    <header>
        <div class="logo-area">
            <span class="logo">Gemini.Lap</span>
            <span class="sub-logo" id="sub-logo">3D CONFIGURATOR EXPERIMENT</span>
        </div>
        <button class="lang-btn" id="lang-toggle" onclick="toggleLang()">EN</button>
    </header>

    <div class="info-panel">
        <h1 class="info-title" id="lap-title">Air 13</h1>
        <p class="info-desc" id="lap-desc">Загрузка спецификаций...</p>
        <div class="info-spec">CPU: <span id="spec-cpu">-</span></div>
        <div class="info-spec">RAM: <span id="spec-ram">-</span></div>
        <div class="info-spec">GPU: <span id="spec-gpu">-</span></div>
    </div>

    <div class="hold-instruction" id="hold-text">Зажмите мышь для кинематографичного фокуса</div>

    <div class="color-picker" id="colors-container"></div>

    <div class="model-selector" id="models-container"></div>

    <script>
        // --- ДАННЫЕ И МУЛЬТИЯЗЫЧНОСТЬ ---
        const data = {
            ru: {
                hold: "Зажмите мышь для кинематографичного фокуса",
                sub: "3D КОНФИГУРАТОР НОУТБУКОВ",
                models: [
                    { id: 0, name: "Aero Air 13", desc: "Ультратонкий корпус из цельного алюминия. Создан для безупречной мобильности и долгой работы.", cpu: "M3 Энергоэффективный", ram: "16 ГБ Unified", gpu: "10-core GPU", colors: ["#d2d2d7", "#2e3641", "#1c1c1e"] },
                    { id: 1, name: "Titan 15 Pro", desc: "Экстремальная игровая станция. Передовое охлаждение и максимальный FPS в любых условиях.", cpu: "i9 14900HX", ram: "32 ГБ DDR5", gpu: "RTX 4080 Laptop", colors: ["#1f2421", "#3c0000", "#002b49"] }
                ]
            },
            en: {
                hold: "Hold click for cinematic focus mode",
                sub: "3D LAPTOP CONFIGURATOR",
                models: [
                    { id: 0, name: "Aero Air 13", desc: "Ultra-thin unibody aluminum chassis. Engineered for seamless mobility and exceptional battery life.", cpu: "M3 Efficient Architecture", ram: "16 GB Unified", gpu: "10-core GPU", colors: ["#d2d2d7", "#2e3641", "#1c1c1e"] },
                    { id: 1, name: "Titan 15 Pro", desc: "Extreme gaming powerhouse. Advanced thermal dynamics and peak FPS anywhere.", cpu: "i9 14900HX High-End", ram: "32 GB DDR5", gpu: "RTX 4080 Laptop", colors: ["#1f2421", "#3c0000", "#002b49"] }
                ]
            }
        };

        let currentLang = "ru";
        let activeModelId = 0;
        let activeColor = data[currentLang].models[0].colors[0];

        // --- НАСТРОЙКА THREE.JS СЦЕНЫ ---
        const container = document.getElementById('webgl-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0c);
        scene.fog = new THREE.FogExp2(0x0a0a0c, 0.15);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2.5, 6);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // Не даем камере уходить под пол
        controls.minDistance = 3;
        controls.maxDistance = 10;

        // --- ОСВЕЩЕНИЕ ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const topLight = new THREE.DirectionalLight(0xffffff, 1.2);
        topLight.position.set(5, 8, 3);
        topLight.castShadow = true;
        scene.add(topLight);

        // Красивая неоновая подсветка сзади (как в студии Lusion)
        const blueLight = new THREE.PointLight(0x0071e3, 2, 10);
        blueLight.position.set(-3, 1, -2);
        scene.add(blueLight);

        // Подиум (пол)
        const floorGeo = new THREE.PlaneGeometry(50, 50);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x111115, roughness: 0.4 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -0.8;
        floor.receiveShadow = true;
        scene.add(floor);

        // --- ГЕНЕРАЦИЯ 3D МОДЕЛИ НОУТБУКА НА ЛЕТУ ---
        let laptopGroup = new THREE.Group();
        scene.add(laptopGroup);

        let bodyMesh, screenMesh;

        function createLaptop3D(colorHex) {
            // Очищаем старую геометрию
            while(laptopGroup.children.length > 0){ 
                laptopGroup.remove(laptopGroup.children[0]); 
            }

            const laptopColor = new THREE.Color(colorHex);
            const bodyMat = new THREE.MeshStandardMaterial({ color: laptopColor, roughness: 0.2, metalness: 0.8 });
            const screenBackMat = bodyMat;
            const screenFrontMat = new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.1, emissive: 0x111111 });
            const keyboardMat = new THREE.MeshStandardMaterial({ color: 0x151515, roughness: 0.5 });

            // Нижняя часть (Топкейс)
            const baseGeo = new THREE.BoxGeometry(2.4, 0.08, 1.6);
            bodyMesh = new THREE.Mesh(baseGeo, bodyMat);
            bodyMesh.position.y = -0.76;
            bodyMesh.castShadow = true;
            laptopGroup.add(bodyMesh);

            // Клавиатура (имитация пластиной)
            const kbGeo = new THREE.PlaneGeometry(2.1, 0.9);
            const kb = new THREE.Mesh(kbGeo, keyboardMat);
            kb.rotation.x = -Math.PI / 2;
            kb.position.set(0, -0.71, 0.1);
            laptopGroup.add(kb);

            // Экранная часть (Крышка)
            screenMesh = new THREE.Group();
            screenMesh.position.set(0, -0.72, -0.78); // Точка шарнира петли крышки

            // Задняя панель крышки
            const panelGeo = new THREE.BoxGeometry(2.4, 1.5, 0.04);
            const panel = new THREE.Mesh(panelGeo, screenBackMat);
            panel.position.y = 0.72; // Смещение относительно центра шарнира
            panel.castShadow = true;
            screenMesh.add(panel);

            // Матрица (Дисплей)
            const displayGeo = new THREE.PlaneGeometry(2.3, 1.4);
            const display = new THREE.Mesh(displayGeo, screenFrontMat);
            display.position.set(0, 0.72, 0.021);
            screenMesh.add(display);

            // Открываем крышку ноутбука на красивый угол
            screenMesh.rotation.x = Math.PI / 2.5; 

            laptopGroup.add(screenMesh);
        }

        // --- ЛОГИКА ИНТЕРФЕЙСА И ОБНОВЛЕНИЯ ---
        function updateUI() {
            const currentData = data[currentLang];
            const model = currentData.models[activeModelId];

            document.getElementById('lap-title').innerText = model.name;
            document.getElementById('lap-desc').innerText = model.desc;
            document.getElementById('spec-cpu').innerText = model.cpu;
            document.getElementById('spec-ram').innerText = model.ram;
            document.getElementById('spec-gpu').innerText = model.gpu;
            document.getElementById('sub-logo').innerText = currentData.sub;
            document.getElementById('hold-text').innerText = currentData.hold;

            // Рендер точек цвета
            const colorContainer = document.getElementById('colors-container');
            colorContainer.innerHTML = '';
            model.colors.forEach((col) => {
                const dot = document.createElement('div');
                dot.className = `color-dot ${col === activeColor ? 'active' : ''}`;
                dot.style.backgroundColor = col;
                dot.onclick = () => {
                    activeColor = col;
                    createLaptop3D(col);
                    updateUI();
                };
                colorContainer.appendChild(dot);
            });

            // Рендер иконок-переключателей моделей
            const modelsContainer = document.getElementById('models-container');
            modelsContainer.innerHTML = '';
            currentData.models.forEach((m) => {
                const btn = document.createElement('button');
                btn.className = `model-btn ${m.id === activeModelId ? 'active' : ''}`;
                btn.onclick = () => {
                    activeModelId = m.id;
                    activeColor = data[currentLang].models[m.id].colors[0];
                    createLaptop3D(activeColor);
                    
                    // Эффектная GSAP анимация «подпрыгивания» ноутбука при смене
                    gsap.from(laptopGroup.position, { y: 0.5, duration: 0.6, ease: "power2.out" });
                    gsap.from(laptopGroup.rotation, { y: Math.PI, duration: 0.8, ease: "power2.out" });
                    
                    updateUI();
                };
                // SVG Иконка ноутбука прямо на кнопке
                btn.innerHTML = `
                    <svg viewBox="0 0 24 24"><path d="M20,18H4V6H20M20,4H4C2.89,4 2,4.89 2,6V18A2,2 0 0,0 4,20H20A2,2 0 0,0 22,18V6C22,4.89 21.1,4 20,4M24,22H0V24H24V22Z"/></svg>
                    ${m.name.split(' ')[1] || m.name}
                `;
                modelsContainer.appendChild(btn);
            });
        }

        function toggleLang() {
            currentLang = currentLang === "ru" ? "en" : "ru";
            document.getElementById('lang-toggle').innerText = currentLang === "ru" ? "EN" : "RU";
            updateUI();
        }

        // --- ЭФФЕКТ КИНЕМАТОГРАФИЧНОГО МАСШТАБИРОВАНИЯ (Эффект удержания клика) ---
        let isHolding = false;

        function startHold() {
            isHolding = true;
            // Плавное приближение камеры, замедление вращения и сужение рамки
            gsap.to(camera.position, { x: 0, y: 0.5, z: 3.5, duration: 1.2, ease: "power2.out" });
            gsap.to('.hud-layer', { borderColor: "rgba(255, 255, 255, 0.4)", duration: 1.2 });
            if(screenMesh) gsap.to(screenMesh.rotation, { x: Math.PI / 3, duration: 1 });
        }

        function endHold() {
            if (!isHolding) return;
            isHolding = false;
            // Возврат камеры в исходное состояние
            gsap.to(camera.position, { x: 0, y: 2.5, z: 6, duration: 0.8, ease: "power2.out" });
            gsap.to('.hud-layer', { borderColor: "rgba(255, 255, 255, 0.1)", duration: 0.8 });
            if(screenMesh) gsap.to(screenMesh.rotation, { x: Math.PI / 2.5, duration: 0.8 });
        }

        // Слушатели событий клика на холсте для эффекта Hold
        container.addEventListener('mousedown', startHold);
        window.addEventListener('mouseup', endHold);
        container.addEventListener('touchstart', startHold);
        window.addEventListener('touchend', endHold);

        // --- LOOP АНИМАЦИИ ---
        function animate() {
            requestAnimationFrame(animate);

            // Если пользователь не крутит мышкой и не удерживает экран — ноутбук плавно вращается сам
            if (!controls.state == -1 && !isHolding) {
                laptopGroup.rotation.y += 0.003;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // Поддержка изменения размеров окна
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Старт
        createLaptop3D(activeColor);
        updateUI();
        animate();
    </script>
</body>
</html>
